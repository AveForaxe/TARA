<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Tara-Icon.png" />
    <link rel="apple-touch-icon" href="/Tara-Icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#070B14" />
    <meta name="description" content="TARA Digital Hub — Platform digital terintegrasi untuk Karang Taruna. Satu QR untuk semua urusan warga." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TARA" />
    <link rel="manifest" href="/manifest.json" />
    <title>TARA — Digitalize the Spirit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
      /* Critical — applied before JS bundle to prevent FOUC on splash */
      body { margin: 0; background: #070B14; }
      .splash-screen {
        position: fixed; inset: 0;
        background: #070B14;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
      }
      .splash-logo {
        width: 96px; height: 96px;
        background: #ffffff;
        border-radius: 24px;
        padding: 11px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 24px;
        box-sizing: border-box;
        box-shadow: 0 8px 32px rgba(255,255,255,0.15);
      }
      .splash-logo img {
        width: 100%; height: 100%;
        object-fit: contain;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="splash-screen" id="splashScreen">
      <div class="splash-logo">
        <img src="/Tara-Icon.png" alt="TARA" />
      </div>
      <div style="font-family:'Inter',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:2px;color:#f9fafb;">TARA</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
